<div id="toast-container"></div>

<!-- LOGIN -->
<div id="login-page" class="login-page hidden">
  <div class="login-bg-shape" style="width:400px;height:400px;top:-100px;left:-100px;"></div>
  <div class="login-bg-shape" style="width:300px;height:300px;bottom:-80px;right:-60px;"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </div>
      <div class="login-title">SESI / SENAI</div>
      <div class="login-subtitle">Sistema de Salas de Informática</div>
    </div>
    <div id="login-error" class="hidden" style="background:rgba(220,53,69,0.1);border:1px solid rgba(220,53,69,0.3);color:#b02a37;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;"></div>
    <div class="form-group">
      <label class="form-label">E-mail institucional</label>
      <input type="email" id="login-email" class="form-control" placeholder="seu@email.senai.br">
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input type="password" id="login-senha" class="form-control" placeholder="••••••••">
    </div>
    <button class="login-submit" id="login-btn" onclick="authLogin()">
      <span id="login-btn-text">Entrar no sistema</span>
    </button>
    <div class="login-divider"><div class="login-divider-line"></div><div class="login-divider-text">DEMO</div><div class="login-divider-line"></div></div>
    
  </div>
</div>
